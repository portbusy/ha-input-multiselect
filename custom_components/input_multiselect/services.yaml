set_options:
  name: Set options
  description: Completely replaces the available options pool. Leave empty to keep existing options unchanged.
  target:
    entity:
      integration: input_multiselect
  fields:
    options:
      name: Options
      description: List of options to set (e.g., ['Kitchen', 'Living Room'] or 'Kitchen, Living Room').
      required: false
      selector:
        text:
          multiple: true

add_options:
  name: Add options
  description: Adds new options to the available options pool.
  target:
    entity:
      integration: input_multiselect
  fields:
    options:
      name: Options
      description: List of options to add.
      required: true
      selector:
        text:
          multiple: true

remove_options:
  name: Remove options
  description: Removes specific options from the available options pool.
  target:
    entity:
      integration: input_multiselect
  fields:
    options:
      name: Options
      description: List of options to remove.
      required: true
      selector:
        text:
          multiple: true

set_value:
  name: Set value (selection)
  description: Overwrites the active selection of the multiselect entity. Options must exist in the pool.
  target:
    entity:
      integration: input_multiselect
  fields:
    options:
      name: Value
      description: List of options to select (e.g., ['Kitchen', 'Living Room']). Leave empty to clear selection.
      required: false
      selector:
        text:
          multiple: true